<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- TTA-UC: Two low-energy photons (red/warm) combine upward into one high-energy photon (blue/violet) -->
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#09090b" stroke="#27272a" stroke-width="2"/>

  <!-- Left incoming photon (warm/red, coming from bottom-left) -->
  <line x1="28" y1="96" x2="54" y2="68" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="28" cy="96" r="4" fill="#f59e0b" opacity="0.7"/>
  <!-- Wavy line effect for left photon -->
  <path d="M30 94 Q36 88 34 82 Q32 76 38 72 Q44 66 50 70" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Right incoming photon (warm/red, coming from bottom-right) -->
  <line x1="100" y1="96" x2="74" y2="68" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="100" cy="96" r="4" fill="#f59e0b" opacity="0.7"/>
  <!-- Wavy line effect for right photon -->
  <path d="M98 94 Q92 88 94 82 Q96 76 90 72 Q84 66 78 70" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Annihilation point (center glow) -->
  <circle cx="64" cy="68" r="8" fill="#6366f1" opacity="0.15"/>
  <circle cx="64" cy="68" r="5" fill="#6366f1" opacity="0.3"/>
  <circle cx="64" cy="68" r="3" fill="#818cf8" opacity="0.6"/>

  <!-- Upconverted photon (blue/violet, going up) -->
  <line x1="64" y1="64" x2="64" y2="24" stroke="#818cf8" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="64,18 56,30 72,30" fill="#818cf8"/>
  <!-- Glow around upconverted photon -->
  <line x1="64" y1="64" x2="64" y2="24" stroke="#6366f1" stroke-width="8" stroke-linecap="round" opacity="0.15"/>

  <!-- Small sparkle at tip -->
  <circle cx="64" cy="18" r="3" fill="#c4b5fd" opacity="0.8"/>

  <style>
    @media (prefers-color-scheme: light) {
      circle:first-of-type { fill: #fafafa; stroke: #e4e4e7; }
    }
  </style>
</svg>
